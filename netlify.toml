[build]
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# Garante que o Google OAuth redirecione corretamente
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
