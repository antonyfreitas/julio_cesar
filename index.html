<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <title>Acesso Restrito</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0f;
      --surface:  #111118;
      --border:   #2a2a3a;
      --accent:   #c8a96e;
      --accent2:  #7c6fd4;
      --text:     #e8e4dc;
      --muted:    #6b6880;
      --error:    #e05c5c;
      --success:  #5ce09a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* ── Grain overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
      background-size: 200px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    /* ── Radial glow ── */
    body::after {
      content: '';
      position: fixed;
      top: -20%; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 700px;
      background: radial-gradient(ellipse, rgba(124,111,212,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Grid lines ── */
    .grid-lines {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(200,169,110,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,169,110,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Main layout ── */
    .stage {
      position: relative; z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      animation: fadein 0.8s ease both;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Lock icon ── */
    .lock-wrap {
      margin-bottom: 2.5rem;
      position: relative;
    }
    .lock-wrap svg {
      width: 52px; height: 52px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 1.5;
      filter: drop-shadow(0 0 12px rgba(200,169,110,0.4));
      transition: filter 0.4s;
    }
    .lock-wrap.unlocked svg {
      stroke: var(--success);
      filter: drop-shadow(0 0 16px rgba(92,224,154,0.5));
    }
    .lock-ring {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 1px solid rgba(200,169,110,0.15);
      animation: pulse-ring 3s ease-in-out infinite;
    }
    @keyframes pulse-ring {
      0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 0.5; }
      50%      { transform: translate(-50%,-50%) scale(1.2); opacity: 0; }
    }

    /* ── Heading ── */
    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--text);
      text-align: center;
      margin-bottom: 0.4rem;
    }
    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .subtitle {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3rem;
      text-align: center;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.4rem 2rem;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03) inset,
        0 32px 64px rgba(0,0,0,0.5),
        0 0 80px rgba(124,111,212,0.06);
    }

    /* ── Input group ── */
    .input-group {
      position: relative;
      margin-bottom: 1.2rem;
    }
    .input-label {
      display: block;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem 3rem 0.85rem 1rem;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .input-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,169,110,0.12);
    }
    .input-wrap input.error {
      border-color: var(--error);
      box-shadow: 0 0 0 3px rgba(224,92,92,0.1);
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60%  { transform: translateX(-6px); }
      40%,80%  { transform: translateX(6px); }
    }

    /* Eye toggle */
    .eye-btn {
      position: absolute;
      right: 0.8rem; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; padding: 4px;
      color: var(--muted);
      transition: color 0.2s;
      line-height: 0;
    }
    .eye-btn:hover { color: var(--accent); }
    .eye-btn svg { width: 18px; height: 18px; }

    /* ── Error message ── */
    .error-msg {
      font-size: 0.72rem;
      color: var(--error);
      margin-top: -0.6rem;
      margin-bottom: 0.8rem;
      min-height: 1rem;
      letter-spacing: 0.05em;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .error-msg.visible { opacity: 1; }

    /* ── Attempts bar ── */
    .attempts {
      display: flex;
      gap: 6px;
      margin-bottom: 1.4rem;
    }
    .attempt-dot {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      transition: background 0.3s;
    }
    .attempt-dot.used { background: var(--error); }

    /* ── Submit button ── */
    .btn {
      width: 100%;
      padding: 0.9rem;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent) 0%, #b8904a 100%);
      color: #0a0a0f;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(200,169,110,0.25);
    }
    .btn:hover:not(:disabled) {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(200,169,110,0.35);
    }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .btn.loading { opacity: 0.7; pointer-events: none; }
    .btn.loading::after {
      content: ' ···';
      animation: dots 1s infinite;
    }
    @keyframes dots {
      0%   { content: ' ·  '; }
      33%  { content: ' ·· '; }
      66%  { content: ' ···'; }
    }

    /* ── Footer tag ── */
    .card-footer {
      margin-top: 1.8rem;
      text-align: center;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    .card-footer span {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success);
      margin-right: 6px;
      vertical-align: middle;
      box-shadow: 0 0 6px var(--success);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    /* ── Locked overlay ── */
    #locked-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s ease, visibility 0.6s;
    }
    #locked-overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* ── Content area (shown after login) ── */
    #content {
      display: none;
      position: relative; z-index: 1;
      padding: 4rem 2rem;
      max-width: 820px;
      margin: 0 auto;
      animation: fadein 0.6s ease both;
    }
    #content.visible { display: block; }

    /* ── Cooldown message ── */
    #cooldown-msg {
      text-align: center;
      font-size: 0.75rem;
      color: var(--error);
      letter-spacing: 0.08em;
      margin-top: 0.8rem;
      display: none;
    }
    #cooldown-msg.visible { display: block; }
  </style>
</head>
<body>

<div class="grid-lines"></div>

<!-- ═══════════════════════════════════════
     TELA DE BLOQUEIO
     ═══════════════════════════════════════ -->
<div id="locked-overlay">
  <div class="stage">
    <div class="lock-wrap" id="lock-icon">
      <div class="lock-ring"></div>
      <svg viewBox="0 0 24 24" id="lock-svg">
        <!-- cadeado fechado -->
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>

    <h1>Área <em>Privada</em></h1>
    <p class="subtitle">Acesso restrito &nbsp;·&nbsp; Digite a senha</p>

    <div class="card">
      <label class="input-label" for="pw">Senha de acesso</label>

      <div class="input-group">
        <div class="input-wrap">
          <input
            type="password"
            id="pw"
            placeholder="••••••••••••"
            autocomplete="current-password"
            autofocus
          />
          <button class="eye-btn" id="eye-btn" type="button" aria-label="Mostrar/ocultar senha">
            <!-- eye icon -->
            <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <p class="error-msg" id="error-msg">Senha incorreta. Tente novamente.</p>

      <div class="attempts" id="attempts">
        <div class="attempt-dot" id="d0"></div>
        <div class="attempt-dot" id="d1"></div>
        <div class="attempt-dot" id="d2"></div>
        <div class="attempt-dot" id="d3"></div>
        <div class="attempt-dot" id="d4"></div>
      </div>

      <button class="btn" id="login-btn">Entrar</button>

      <p id="cooldown-msg">Muitas tentativas. Aguarde <span id="countdown">30</span>s.</p>

      <div class="card-footer">
        <span></span>Conexão segura
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     CONTEÚDO (visível após login)
     ═══════════════════════════════════════ -->
<div id="content">
  <!-- 
    ✏️  EDITE AQUI: substitua pelo seu conteúdo real.
    Você pode incluir links, iframes, listas de arquivos, etc.
  -->
  <h1 style="font-family:'DM Serif Display',serif; font-size:2.5rem; margin-bottom:1rem; color: var(--accent)">
    Bem-vindo de volta.
  </h1>
  <p style="color:var(--muted); font-size:0.9rem; line-height:1.8;">
    Este é o seu espaço privado. Adicione aqui links, arquivos, anotações ou qualquer conteúdo que desejar.
  </p>
  <br>
  <p style="color:var(--muted); font-size:0.75rem;">
    Exemplo de link: <a href="./pasta/arquivo.html" style="color:var(--accent)">Meu documento</a>
  </p>
</div>

<script>
  // ═══════════════════════════════════════════════════════════
  // ⚙️  CONFIGURAÇÕES — edite apenas este bloco
  // ═══════════════════════════════════════════════════════════
  const CONFIG = {
    // 🔑 Troque para a sua senha. Use algo forte!
    password: "##**@@ntonyQF10",

    // ⏳ Tentativas antes do bloqueio temporário
    maxAttempts: 5,

    // ⏰ Cooldown em segundos após esgotar as tentativas
    cooldownSecs: 30,

    // 💾 Manter sessão aberta no mesmo browser? (sessionStorage)
    rememberSession: true,
  };
  // ═══════════════════════════════════════════════════════════

  const overlay   = document.getElementById("locked-overlay");
  const content   = document.getElementById("content");
  const pwInput   = document.getElementById("pw");
  const loginBtn  = document.getElementById("login-btn");
  const errorMsg  = document.getElementById("error-msg");
  const cooldownMsg = document.getElementById("cooldown-msg");
  const countdown = document.getElementById("countdown");
  const lockIcon  = document.getElementById("lock-icon");
  const lockSvg   = document.getElementById("lock-svg");
  const eyeBtn    = document.getElementById("eye-btn");
  const eyeIcon   = document.getElementById("eye-icon");
  const dots      = Array.from(document.querySelectorAll(".attempt-dot"));

  let attempts = 0;
  let locked = false;
  let cooldownTimer = null;

  // Verificar sessão salva
  if (CONFIG.rememberSession && sessionStorage.getItem("pvt_auth") === "1") {
    unlock(false);
  }

  // Eye toggle
  eyeBtn.addEventListener("click", () => {
    const isText = pwInput.type === "text";
    pwInput.type = isText ? "password" : "text";
    eyeIcon.innerHTML = isText
      ? `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`
      : `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;
  });

  // Enter key
  pwInput.addEventListener("keydown", e => { if (e.key === "Enter") tryLogin(); });
  loginBtn.addEventListener("click", tryLogin);

  function tryLogin() {
    if (locked) return;
    const val = pwInput.value.trim();

    if (val === CONFIG.password) {
      // ✅ Correto
      if (CONFIG.rememberSession) sessionStorage.setItem("pvt_auth", "1");
      unlock(true);
    } else {
      // ❌ Errado
      attempts++;
      updateDots();
      showError();
      pwInput.value = "";
      pwInput.classList.add("error");
      setTimeout(() => pwInput.classList.remove("error"), 500);

      if (attempts >= CONFIG.maxAttempts) {
        startCooldown();
      }
    }
  }

  function unlock(animate) {
    if (animate) {
      // Animação de desbloqueio
      lockSvg.innerHTML = `
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 9.9-1"/>`;
      lockIcon.classList.add("unlocked");
      setTimeout(() => {
        overlay.classList.add("hidden");
        content.classList.add("visible");
      }, 600);
    } else {
      overlay.classList.add("hidden");
      content.classList.add("visible");
    }
  }

  function showError() {
    errorMsg.classList.add("visible");
    setTimeout(() => errorMsg.classList.remove("visible"), 2500);
  }

  function updateDots() {
    for (let i = 0; i < Math.min(attempts, CONFIG.maxAttempts); i++) {
      dots[i] && dots[i].classList.add("used");
    }
  }

  function startCooldown() {
    locked = true;
    loginBtn.disabled = true;
    pwInput.disabled = true;

    let secs = CONFIG.cooldownSecs;
    countdown.textContent = secs;
    cooldownMsg.classList.add("visible");

    cooldownTimer = setInterval(() => {
      secs--;
      countdown.textContent = secs;
      if (secs <= 0) {
        clearInterval(cooldownTimer);
        locked = false;
        loginBtn.disabled = false;
        pwInput.disabled = false;
        cooldownMsg.classList.remove("visible");
        attempts = 0;
        dots.forEach(d => d.classList.remove("used"));
        pwInput.focus();
      }
    }, 1000);
  }
</script>
</body>
</html>
