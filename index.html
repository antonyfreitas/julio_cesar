<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet"/>
  <title>Área Privada | Antony</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    /* Estilos preservados da tua versão anterior */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #111118; --surface2: #181824;
      --border: #2a2a3a; --accent: #c8a96e; --accent2: #7c6fd4;
      --text: #e8e4dc; --muted: #6b6880;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif; line-height: 1.6;
      overflow-x: hidden;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    #login-wrapper { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    #content { display: none; animation: fadeIn 0.5s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .admin-panel { margin-top: 20px; border: 1px dashed var(--accent); padding: 25px; border-radius: 12px; background: rgba(200, 169, 110, 0.03); }
    .btn-primary { background: var(--accent); color: var(--bg); border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }

    .section { margin-bottom: 40px; }
    .section-header { display: flex; align-items: center; margin-bottom: 20px; gap: 15px; }
    .section-title { font-family: 'DM Serif Display', serif; font-size: 1.5rem; color: var(--accent); }
    .section-line { height: 1px; flex: 1; background: var(--border); }
    .link-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
    .link-card { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 12px; text-decoration: none; display: flex; align-items: center; gap: 15px; transition: 0.3s; }
    .link-card:hover { border-color: var(--accent); background: var(--surface2); }
    .link-icon { font-size: 1.5rem; }
    .link-title { color: var(--text); font-weight: 500; }
    .link-desc { color: var(--muted); font-size: 0.85rem; }
    .hidden-item { display: none !important; }
  </style>
</head>
<body>

<div class="container">
  <div id="login-wrapper">
    <h1 style="font-family: 'DM Serif Display', serif; font-size: 3.5rem; margin-bottom: 10px;">Área Privada</h1>
    <p style="color: var(--muted); margin-bottom: 30px;">Acesso exclusivo para <b>Antony Freitas</b></p>
    
    <div id="g_id_onload"
         data-client_id="SEU_ID_DO_GOOGLE_AQUI.apps.googleusercontent.com"
         data-callback="onSignIn">
    </div>
    <div class="g_id_signin" data-type="standard" data-theme="filled_black"></div>
  </div>

  <div id="content">
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
      <div>
        <h2 id="user-name" style="font-family: 'DM Serif Display', serif; color: var(--accent);"></h2>
        <p style="font-size: 0.8rem; color: var(--muted);">Gerenciador de Projetos Nelogica & Pessoal</p>
      </div>
      <button onclick="logout()" style="background: none; border: 1px solid var(--border); color: var(--muted); padding: 8px 15px; border-radius: 6px; cursor: pointer;">Sair</button>
    </div>

    <div class="section admin-panel">
        <h3 style="color: var(--accent); margin-bottom: 10px; font-family: 'DM Serif Display', serif;">🚀 Upload Rápido (GitHub)</h3>
        <p style="font-size: 0.85rem; color: var(--muted); margin-bottom: 20px;">
            Arraste um arquivo para subir direto para o repositório <b>julio_cesar</b>.
        </p>
        
        <div style="display: flex; gap: 12px; flex-wrap: wrap; align-items: center;">
            <input type="file" id="file-upload-input" style="display: none;" onchange="handleFileUpload(this.files)">
            <button class="btn-primary" onclick="document.getElementById('file-upload-input').click()">
                📁 Selecionar Arquivo
            </button>
            <button onclick="configToken()" style="background: none; border: 1px solid var(--border); color: var(--text); padding: 10px 15px; border-radius: 8px; cursor: pointer;">
                🔑 Configurar Token
            </button>
        </div>
        <div id="upload-status" style="margin-top: 15px; font-size: 0.85rem; font-family: 'DM Mono', monospace;"></div>
    </div>

    <div class="section" id="recent-uploads-section" style="display: none;">
        <div class="section-header">
            <span class="section-title">Enviados Agora</span>
            <div class="section-line"></div>
        </div>
        <div class="link-grid" id="recent-links-grid"></div>
    </div>

    <div class="section">
      <input type="text" id="search-input" placeholder="O que você está procurando, Antony?" 
             style="width: 100%; padding: 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; color: var(--text); outline: none; font-size: 1rem;">
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-title">Atalhos do Sistema</span>
        <div class="section-line"></div>
      </div>
      <div class="link-grid">
        <a class="link-card" href="https://github.com/antonyfreitas/julio_cesar" target="_blank">
          <div class="link-icon">🛠️</div>
          <div class="link-info">
            <div class="link-title">Configurações GitHub</div>
            <div class="link-desc">Gerenciar repositório julio_cesar</div>
          </div>
        </a>
      </div>
    </div>

  </div>
</div>

<script>
  // 1. LOGIN GOOGLE
  function onSignIn(response) {
    const data = parseJwt(response.credential);
    
    // ⚠️ COLOQUE SEU E-MAIL AQUI
    const allowedEmails = ["antonyfreitas@gmail.com"]; 

    if (allowedEmails.includes(data.email)) {
      document.getElementById("login-wrapper").style.display = "none";
      document.getElementById("content").style.display = "block";
      document.getElementById("user-name").textContent = `Bem-vindo, ${data.given_name}`;
    } else {
      alert("Acesso negado: E-mail não autorizado.");
    }
  }

  function parseJwt(token) {
    const base64 = token.split(".")[1].replace(/-/g,"+").replace(/_/g,"/");
    return JSON.parse(decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
  }

  function logout() { location.reload(); }

  // 2. TOKEN GITHUB
  function configToken() {
    const t = prompt("Insira seu GitHub Token (permissão 'contents:write'):");
    if(t) {
        localStorage.setItem('gh_token', t);
        alert("Token configurado! Ficará salvo apenas neste navegador.");
    }
  }

  // 3. UPLOAD PARA GITHUB
  async function handleFileUpload(files) {
    const file = files[0];
    const token = localStorage.getItem('gh_token');
    const status = document.getElementById('upload-status');
    
    if(!token) { alert("Configure o Token primeiro!"); return; }
    if(!file) return;

    status.innerHTML = `⏳ Subindo <b>${file.name}</b>...`;
    status.style.color = "var(--accent)";

    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = async () => {
        const base64Content = reader.result.split(',')[1];
        
        // Configuração do seu repo
        const repo = "antonyfreitas/julio_cesar";
        const path = file.name; // Salva na raiz

        try {
            const response = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: `Upload via Dashboard: ${file.name}`,
                    content: base64Content
                })
            });

            if(response.ok) {
                status.innerHTML = `✅ Sucesso! <b>${file.name}</b> já está no repositório.`;
                status.style.color = "#4ade80";
                exibirNovoLink(file.name);
            } else {
                const err = await response.json();
                status.innerHTML = `❌ Erro: ${err.message}`;
                status.style.color = "#f87171";
            }
        } catch (e) {
            status.innerHTML = "❌ Erro de conexão com o GitHub.";
        }
    };
  }

  function exibirNovoLink(fileName) {
    const grid = document.getElementById('recent-links-grid');
    const section = document.getElementById('recent-uploads-section');
    section.style.display = "block";
    const url = `https://antonyfreitas.github.io/julio_cesar/${fileName}`;
    
    const card = document.createElement('a');
    card.className = 'link-card';
    card.href = url;
    card.target = "_blank";
    card.innerHTML = `<div class="link-icon">📄</div><div class="link-info"><div class="link-title">${fileName}</div><div class="link-desc">Visualizar arquivo agora</div></div>`;
    grid.prepend(card);
  }

  // 4. BUSCA
  document.getElementById("search-input").addEventListener("input", (e) => {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll(".link-card").forEach(card => {
      const match = card.innerText.toLowerCase().includes(q);
      card.classList.toggle("hidden-item", !match);
    });
  });
</script>

</body>
</html>
